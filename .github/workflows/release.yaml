name: Build and Release .NET AOT App

on:
  push:
    tags:
      - "v*" # Trigger on version tags (v1.0.0, v2.1.3, etc.)

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_NAME: "mysqldiffsharp" # Change to your actual project name
  PROJECT_PATH: "MySqlDiffSharp.csproj" # Path to your .csproj file

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install required workloads
        run: dotnet workload install wasm-tools # Required for AOT compilation

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build AOT for Windows
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-x64 `
            -o ./publish/windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: ./publish/windows/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install required workloads
        run: dotnet workload install wasm-tools # Required for AOT compilation

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build AOT for Linux
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r linux-x64 \
            -o ./publish/linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: ./publish/linux/

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-app
          path: ./artifacts/windows/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-app
          path: ./artifacts/linux/

      - name: Create archives
        run: |
          # Create Windows zip
          cd ./artifacts/windows
          zip -r ../../${{ env.PROJECT_NAME }}-windows-x64.zip .
          cd ../..

          # Create Linux tar.gz
          cd ./artifacts/linux
          tar -czf ../../${{ env.PROJECT_NAME }}-linux-x64.tar.gz .
          cd ../..

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            ${{ env.PROJECT_NAME }}-windows-x64.zip
            ${{ env.PROJECT_NAME }}-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
